<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OEA</title>
    <meta name="description" content="Lovable Generated Project" />
    <meta name="author" content="Lovable" />
    <meta property="og:image" content="/og-image.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; frame-src *; style-src * 'unsafe-inline';">
    <script>
      // Load Google Analytics based on site configuration
      window.addEventListener('load', async function() {
        try {
          const { data } = await fetch('https://qegpuqitjfocyyrivlhv.functions.supabase.co/get-google-analytics-id', {
            headers: {
              'Authorization': `Bearer ${window.VITE_SUPABASE_ANON_KEY}`,
              'Content-Type': 'application/json'
            }
          }).then(res => res.json());
          
          if (data?.value) {
            // Create and load the Google Analytics script
            const script = document.createElement('script');
            script.async = true;
            script.src = `https://www.googletagmanager.com/gtag/js?id=${data.value}`;
            document.head.appendChild(script);

            // Initialize Google Analytics
            window.dataLayer = window.dataLayer || [];
            function gtag() {
              dataLayer.push(arguments);
            }
            gtag('js', new Date());
            gtag('config', data.value);
          }
        } catch (error) {
          console.error('Error loading Google Analytics:', error);
        }
      });
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script>
      window.VITE_SUPABASE_URL = 'https://qegpuqitjfocyyrivlhv.supabase.co';
      window.VITE_SUPABASE_ANON_KEY = 'your-anon-key';
    </script>
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module" crossorigin="anonymous"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
